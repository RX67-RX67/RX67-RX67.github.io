---
layout: default
---

<article class="page">
  <header class="page-header">
    <h1 class="page-title">
      <span data-i18n="en">{{ page.title }}</span>
      {% if page.title_zh %}<span data-i18n="zh">{{ page.title_zh }}</span>{% else %}<span data-i18n="zh">{{ page.title }}</span>{% endif %}
    </h1>
  </header>
  <div class="page-content">
    {{ content }}
  </div>
</article>
