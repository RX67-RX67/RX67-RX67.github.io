- title: "U.S. Manufacturing Sector Analysis Dashboard"
  title_zh: "美国制造业部门分析仪表盘"
  status: ""
  status_zh: ""
  description: "Built a full-stack economic intelligence dashboard that aggregates live data from 5 federal APIs (FRED, BLS, Census M3, BEA, Census CBP) into a unified PostgreSQL database. Designed a weekly ETL pipeline on GitHub Actions with retry logic and MD5-based cache invalidation. Integrated Claude (claude-sonnet-4-6) to auto-generate section-level economic reports cached in Supabase. Deployed a FastAPI backend on Railway and a Next.js server-rendered frontend on Vercel, with D3/TopoJSON state employment maps and Recharts time-series visualizations."
  description_zh: "搭了一套全栈经济情报仪表盘，把 5 个联邦数据源（FRED、BLS、Census M3、BEA、Census CBP）的实时数据汇总到一个 PostgreSQL 数据库里。用 GitHub Actions 写了一条每周自动跑的 ETL 流水线，带重试机制和基于 MD5 的缓存失效逻辑。接入 Claude（claude-sonnet-4-6），自动生成各板块的经济分析报告并缓存到 Supabase。后端是部署在 Railway 上的 FastAPI，前端是部署在 Vercel 上、服务端渲染的 Next.js，里面还做了基于 D3/TopoJSON 的各州就业地图，以及用 Recharts 画的时间序列图表。"
  tech: "Python, FastAPI, Next.js, TypeScript, Supabase, Anthropic Claude, D3, Recharts, GitHub Actions, Railway, Vercel"
  repo: "https://github.com/RX67-RX67/manufacturing-section-analysis"
  demo: "https://manufacturing-section-analysis.vercel.app"

- title: "Data Center Siting Analysis and Predictive Modeling at the County Level"
  title_zh: "美国县级数据中心选址分析与预测建模"
  status: ""
  status_zh: ""
  description: "Built a county-level data pipeline integrating 9+ public datasets (electricity pricing, environmental risk, grid employment, broadband, labor costs, land prices, transportation access) with web-scraped data center locations and LLM-validated policy information. Engineered a 3,138-county feature table and developed a two-part LightGBM hurdle model to separately predict data center presence and scale, using SHAP for interpretation. Produced a county-level attractiveness ranking to identify likely future data center sites."
  description_zh: "搭建了一套县级数据流水线，整合了 9 个以上的公开数据集（电价、环境风险、电网就业、宽带覆盖、劳动力成本、地价、交通可达性），并结合网络爬取的数据中心位置信息和经过大模型校验的政策数据。构建了覆盖 3,138 个县的特征表，并开发了一个两阶段 LightGBM hurdle 模型，分别预测数据中心的有无和规模，并用 SHAP 做可解释性分析。最终生成各县的吸引力排名，用于识别未来可能新建数据中心的地区。"
  tech: "Python, LightGBM, SHAP, Pandas, Jupyter, Web Scraping, LLM-assisted Validation"
  repo: "https://github.com/RX67-RX67/data-center-siting-analysis"
  demo: "https://data-center-siting-analysis-67jzjqh8jepvjehtx6fvra.streamlit.app/"
